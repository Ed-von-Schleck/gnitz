[package]
name = "gnitz-engine"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "gnitz-server"
path = "src/main.rs"

[dependencies]
xxhash-rust = { version = "0.8", features = ["xxh3"] }
xorf = { version = "0.12", default-features = false }
libc = "0.2"
gnitz-transport = { path = "../gnitz-transport" }

[dev-dependencies]
tempfile = "3"
